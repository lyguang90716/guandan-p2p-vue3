name: Build and Push Docker Image

# 触发条件：只要 main 分支有任何代码变动（Push）就立刻执行
on:
  push:
    branches: [ "main" ]
  # 增加下面这两行：允许你在 GitHub 网页上通过手动点击按钮来强制触发构建
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取你仓库的代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 登录到 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. 设置 Docker Buildx（多架构支持与缓存加速）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. 构建并推送到 Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 自动读取你的 Docker Hub 用户名，镜像名存为 guandan-p2p
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/guandan-p2p:latest
