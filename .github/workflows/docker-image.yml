name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]  # 当 main 分支有代码提交或修改时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 登录到 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. 设置 Docker Buildx（以便支持多架构构建，提速）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. 构建并推送到 Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 注意：这里会自动读取你的 Docker Hub 用户名，镜像名存为 guandan-p2p
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/guandan-p2p:latest
